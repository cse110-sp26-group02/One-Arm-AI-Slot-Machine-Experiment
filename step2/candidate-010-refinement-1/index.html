<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Casino Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    <div class="slot-container">
        <div id="machine">
            <div id="reels">
                <div class="reel" id="reel1">7</div>
                <div class="reel" id="reel2">7</div>
                <div class="reel" id="reel3">7</div>
            </div>
            <div id="lever" onclick="spin()">Pull</div>
        </div>
        <div id="score">Tokens: <span id="token-count">100</span></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
