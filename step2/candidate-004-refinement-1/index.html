<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Royale Slot Machine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="animated-background"></div>
    <div class="container">
        <header>
            <h1>CASINO ROYALE</h1>
            <div class="stats">
                <div class="stat-box">
                    <span class="label">CREDITS:</span>
                    <span id="balance" class="value">1000</span>
                </div>
            </div>
        </header>

        <main class="slot-machine">
            <div class="reels-container">
                <div class="reel" id="reel-0"><div class="symbols">🧠</div></div>
                <div class="reel" id="reel-1"><div class="symbols">🤖</div></div>
                <div class="reel" id="reel-2"><div class="symbols">📈</div></div>
            </div>
            
            <div class="lever-container">
                <div class="lever" id="lever"></div>
            </div>

            <div class="status-board">
                <p id="status-message">Pull the lever to play!</p>
                <div id="floating-number" class="floating-number"></div>
            </div>
        </main>
        
        <footer>
            <div class="paytable">
                <h3>PAYTABLE</h3>
                <p>🧠🧠🧠: 500 | 🤖🤖🤖: 250 | 📈📈📈: 100</p>
                <p>Double: See Special Rules</p>
            </div>
        </footer>
    </div>

    <!-- Minigame Overlay -->
    <div id="minigame-overlay" class="hidden">
        <div class="minigame-content">
            <h2>Out of Credits!</h2>
            <p>Play the Lucky Clicker to earn more!</p>
            <button id="minigame-btn" class="btn">CLICK FAST!</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
