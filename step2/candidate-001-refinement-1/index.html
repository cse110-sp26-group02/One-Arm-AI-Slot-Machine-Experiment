<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Burner 9000</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="animated-background"></div>
    <div class="container">
        <h1>AI Token Burner 9000</h1>
        <div class="balance-board">
            <h2>Context Window (Tokens): <span id="balance">10000</span></h2>
        </div>
        <div class="slot-machine-wrapper">
            <div class="slot-machine">
                <div class="slot" id="slot1">🤖</div>
                <div class="slot" id="slot2">🤖</div>
                <div class="slot" id="slot3">🤖</div>
            </div>
            <div class="lever" id="lever"></div>
        </div>
        <div class="controls">
            <button id="spin-btn">Generate (Cost: 1000 Tokens)</button>
        </div>
        <div class="message-board">
            <p id="message">Pull the lever to begin...</p>
        </div>
        <div class="paytable">
            <h3>API Pricing (Payouts)</h3>
            <p>🪙🪙🪙 : 5,000 Tokens</p>
            <p>🧠🧠🧠 : 10,000 Tokens</p>
            <p>🤖🤖🤖 : 20,000 Tokens</p>
            <p>🖥️🖥️🖥️ : 50,000 Tokens</p>
            <p>📉 Any mix with 📉 : -500 Tokens (Rate Limit)</p>
            <p>🤡 Any mix with 🤡 : 0 Tokens (Hallucination)</p>
        </div>
    </div>
    <div id="confetti-container"></div>
    <script src="script.js"></script>
</body>
</html>
