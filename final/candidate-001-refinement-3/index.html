<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Overlord Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="confetti"></canvas>

    <div id="game-container">
        <h1 class="neon-text">AI Overlord Slots</h1>
        
        <div id="top-panel">
            <div id="stats">
                <div class="stat-box">TOKENS: <span id="token-count">100</span></div>
                <div class="stat-box">COST / SPIN: 10</div>
            </div>
            <div id="paytable">
                <h3>PAYTABLE</h3>
                <p>🟢 3 Match: <strong>+50</strong></p>
                <p>🟡 2 Match: <strong>+15</strong></p>
            </div>
        </div>

        <div id="slot-machine-wrapper">
            <div id="slot-machine">
                <div class="slot" id="slot1">🤖</div>
                <div class="slot" id="slot2">💾</div>
                <div class="slot" id="slot3">⚡</div>
                
                <div id="lever-container">
                    <div id="lever-stick">
                        <div id="lever-knob"></div>
                    </div>
                </div>
            </div>
        </div>

        <br>
        <button id="spin-btn">SPIN SEQUENCE</button>
        <p id="message">Insert tokens to calculate probability of ruin...</p>
    </div>

    <!-- Minigame Modal -->
    <div id="minigame-modal">
        <div class="minigame-content">
            <h2>OUT OF TOKENS</h2>
            <p>Prove you have human reflexes to mine 30 tokens.</p>
            <div id="catch-area">
                <button id="catch-btn">I am not a robot</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
