<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Overlord Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>AI Overlord Slots</h1>
        
        <div id="stats">
            Tokens: <span id="token-count">100</span> | Cost per Spin: <span id="spin-cost">10</span>
        </div>

        <div id="slot-machine">
            <div class="slot-window">
                <div class="slot" id="slot1">?</div>
                <div class="slot" id="slot2">?</div>
                <div class="slot" id="slot3">?</div>
            </div>
            <div id="lever" onclick="spin()"></div>
        </div>

        <div id="message">Feed the AI tokens to appease it!</div>
        
        <div id="paytable">
            <h3>Paytable</h3>
            <p>Double: +20 | Triple: +100</p>
        </div>
    </div>

    <!-- Audio placeholders: Add your own .mp3 files in the project directory -->
    <audio id="sound-spin" src="spin.mp3"></audio>
    <audio id="sound-win" src="win.mp3"></audio>
    <audio id="sound-empty" src="empty.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
