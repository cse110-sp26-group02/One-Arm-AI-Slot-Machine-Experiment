<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI TOKEN CASINO v1.0.4-beta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal-container">
        <header>
            <h1>AI TOKEN CASINO</h1>
        </header>

        <section class="quota-display">
            <span>TOKENS: <span id="token-balance">100,000</span></span>
        </section>

        <main class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel-1">🤖</div>
                <div class="reel" id="reel-2">🤖</div>
                <div class="reel" id="reel-3">🤖</div>
            </div>
            <div class="lever-container" id="lever-container">
                <div class="lever" id="lever">
                    <div class="lever-handle"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
