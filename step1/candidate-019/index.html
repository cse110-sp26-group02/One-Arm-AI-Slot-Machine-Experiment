<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Overlord Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>AI-Slot: The Hallucination Engine</h1>
        <div id="balance">Tokens: <span id="token-count">100</span></div>
        <div class="slots">
            <div id="reel1" class="reel">?</div>
            <div id="reel2" class="reel">?</div>
            <div id="reel3" class="reel">?</div>
        </div>
        <button id="spin-btn">Optimize/Spin (Cost: 10)</button>
        <p id="message"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
