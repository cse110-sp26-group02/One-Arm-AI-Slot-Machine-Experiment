<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Reckoning: The Compute Token Slot Machine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game">
        <h1>AI Reckoning</h1>
        <div id="tokens">Tokens: <span id="token-count">100</span></div>
        <div id="reels">
            <div class="reel" id="reel1">?</div>
            <div class="reel" id="reel2">?</div>
            <div class="reel" id="reel3">?</div>
        </div>
        <button id="spin-btn">SPIN (Cost: 10 Tokens)</button>
        <p id="message"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
