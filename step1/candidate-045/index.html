<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI TOKEN CASINO v1.0.4-beta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal-container">
        <header>
            <div class="header-line">AI_TOKEN_CASINO_OS [Version 1.0.4]</div>
            <div class="header-line">(c) 2026 OpenAI-ish Corp. All rights reserved.</div>
            <div class="header-line">-------------------------------------------</div>
        </header>

        <section class="quota-display">
            <span class="label">CURRENT_API_QUOTA:</span>
            <span id="token-balance" class="value">100,000</span>
            <span class="unit">TOKENS</span>
        </section>

        <main class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel-1">🤖</div>
                <div class="reel" id="reel-2">🤖</div>
                <div class="reel" id="reel-3">🤖</div>
            </div>

            <div class="controls">
                <button id="spin-btn">> GENERATE_RESPONSE</button>
            </div>
        </main>

        <section class="console">
            <div id="console-logs">
                <div class="log">System initialized...</div>
                <div class="log">Waiting for prompt...</div>
            </div>
            <div class="cursor-line">
                <span class="prompt">></span><span class="cursor">_</span>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
