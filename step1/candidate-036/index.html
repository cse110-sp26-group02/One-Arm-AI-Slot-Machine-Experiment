<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine: The Singularity of Debt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>AI Slot Machine</h1>
        <div id="stats">
            Tokens: <span id="token-count">100</span>
        </div>
        <div id="slots">
            <div class="slot" id="slot1">?</div>
            <div class="slot" id="slot2">?</div>
            <div class="slot" id="slot3">?</div>
        </div>
        <button id="spin-btn">Spin (Cost: 10 Tokens)</button>
        <p id="message"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
