<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Slot Machine: The Singularity of Debt</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: monospace; text-align: center; }
        .slot-container { display: flex; justify-content: center; gap: 10px; margin: 20px; }
        .slot { width: 100px; height: 100px; border: 2px solid #00ff00; display: flex; align-items: center; justify-content: center; font-size: 2em; }
        #balance { font-size: 1.5em; margin: 20px; }
    </style>
</head>
<body>
    <h1>AI Slot Machine</h1>
    <div id="balance">Tokens: 100</div>
    <div class="slot-container">
        <div class="slot" id="slot1">🤖</div>
        <div class="slot" id="slot2">🤖</div>
        <div class="slot" id="slot3">🤖</div>
    </div>
    <button onclick="spin()">Spin (-10 Tokens)</button>
    <script>
        let tokens = 100;
        const symbols = ['🤖', '💾', '⚡', '🚫', '📉', '🧠'];
        function spin() {
            if (tokens < 10) return alert("Insufficient compute tokens!");
            tokens -= 10;
            const res = [
                symbols[Math.floor(Math.random()*symbols.length)],
                symbols[Math.floor(Math.random()*symbols.length)],
                symbols[Math.floor(Math.random()*symbols.length)]
            ];
            document.getElementById('slot1').innerText = res[0];
            document.getElementById('slot2').innerText = res[1];
            document.getElementById('slot3').innerText = res[2];
            if (res[0] === res[1] && res[1] === res[2]) {
                tokens += 50;
                alert("You hallucinated a win!");
            }
            document.getElementById('balance').innerText = "Tokens: " + tokens;
        }
    </script>
</body>
</html>
