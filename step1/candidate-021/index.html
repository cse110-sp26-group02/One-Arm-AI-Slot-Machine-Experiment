<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Overlord Slot Machine</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .slot-container { display: flex; gap: 10px; margin: 20px; font-size: 3rem; background: #333; padding: 20px; border: 4px solid #00ff00; }
        .slot { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; background: #000; border: 2px solid #555; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #00ff00; color: #000; border: none; font-weight: bold; }
        button:disabled { background: #444; }
        #status { margin: 20px; font-size: 1.5rem; }
    </style>
</head>
<body>
    <h1>AI Overlord Slot Machine</h1>
    <div id="status">Tokens: <span id="tokens">100</span></div>
    <div class="slot-container">
        <div id="slot1" class="slot">🤖</div>
        <div id="slot2" class="slot">🤖</div>
        <div id="slot3" class="slot">🤖</div>
    </div>
    <button id="spinBtn">SPIN (-10 Tokens)</button>
    <p>Win logic: If the AI agrees with itself, you get rich. If not, the AI takes your compute.</p>

    <script>
        const symbols = ['🤖', '🧠', '💾', '⚡', '🚫'];
        const tokensEl = document.getElementById('tokens');
        const spinBtn = document.getElementById('spinBtn');
        let tokens = 100;

        spinBtn.addEventListener('click', () => {
            if (tokens < 10) return alert("Out of compute!");
            tokens -= 10;
            tokensEl.textContent = tokens;
            
            const s1 = symbols[Math.floor(Math.random() * symbols.length)];
            const s2 = symbols[Math.floor(Math.random() * symbols.length)];
            const s3 = symbols[Math.floor(Math.random() * symbols.length)];
            
            document.getElementById('slot1').textContent = s1;
            document.getElementById('slot2').textContent = s2;
            document.getElementById('slot3').textContent = s3;

            if (s1 === s2 && s2 === s3) {
                tokens += 100;
                tokensEl.textContent = tokens;
                alert("The AI had a hallucination and gave you tokens!");
            }
        });
    </script>
</body>
</html>
