<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hallucination Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AI Hallucination Slot</h1>
        <div id="token-display">Tokens: <span id="tokens">100</span></div>
        <div class="reels">
            <div class="reel" id="reel1">?</div>
            <div class="reel" id="reel2">?</div>
            <div class="reel" id="reel3">?</div>
        </div>
        <button id="spin-btn">Consume Tokens to Spin</button>
        <p id="message">"I am thinking... please wait."</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
