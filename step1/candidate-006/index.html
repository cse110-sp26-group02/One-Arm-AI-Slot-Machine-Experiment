<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine: Profit or Hallucination?</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a1a2e; color: #e94560; }
        .slot-container { display: flex; gap: 10px; margin: 20px; }
        .slot { width: 100px; height: 100px; border: 4px solid #0f3460; display: flex; align-items: center; justify-content: center; font-size: 3rem; background: #16213e; border-radius: 10px; }
        .controls { display: flex; gap: 20px; align-items: center; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #e94560; color: white; border: none; border-radius: 5px; }
        button:disabled { background: #53344d; cursor: not-allowed; }
        #message { margin-top: 20px; font-size: 1.5rem; text-align: center; }
    </style>
</head>
<body>
    <h1>AI Hallucination Slot</h1>
    <div id="balance">Tokens: 100</div>
    <div class="slot-container">
        <div id="s1" class="slot">?</div>
        <div id="s2" class="slot">?</div>
        <div id="s3" class="slot">?</div>
    </div>
    <div class="controls">
        <button id="spin-btn">Spin (Cost: 10)</button>
    </div>
    <div id="message">Feeling lucky, human?</div>

    <script>
        const symbols = ['🤖', '💾', '🔌', '📉', '🧠', '🚫'];
        let balance = 100;

        const spin = () => {
            if (balance < 10) {
                document.getElementById('message').innerText = "Insufficient tokens. Buy more compute or get a real job.";
                return;
            }
            balance -= 10;
            updateUI();
            
            const results = [
                symbols[Math.floor(Math.random() * symbols.length)],
                symbols[Math.floor(Math.random() * symbols.length)],
                symbols[Math.floor(Math.random() * symbols.length)]
            ];
            
            document.getElementById('s1').innerText = results[0];
            document.getElementById('s2').innerText = results[1];
            document.getElementById('s3').innerText = results[2];

            if (results[0] === results[1] && results[1] === results[2]) {
                balance += 50;
                document.getElementById('message').innerText = "Winner! You successfully hallucinated a profit!";
            } else {
                document.getElementById('message').innerText = "Loss. Another training cycle wasted.";
            }
            updateUI();
        };

        const updateUI = () => {
            document.getElementById('balance').innerText = `Tokens: ${balance}`;
        };

        document.getElementById('spin-btn').addEventListener('click', spin);
    </script>
</body>
</html>
