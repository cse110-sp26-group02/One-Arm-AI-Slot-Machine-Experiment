<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Overlord Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>AI Overlord Slots</h1>
        <div id="balance">Tokens: <span id="tokens">100</span></div>

            <div class="slot" id="slot2">?</div>
            <div class="slot" id="slot3">?</div>

        <button id="spin-btn">Pay 10 Tokens to Learn Nothing</button>
        <p id="message"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
