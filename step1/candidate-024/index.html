<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Overlord Slot Machine</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; }
        .slot-machine { border: 5px solid #333; padding: 20px; display: inline-block; margin-top: 50px; background: #000; }
        .slots { display: flex; gap: 10px; font-size: 3em; margin: 20px 0; justify-content: center; }
        .slot { border: 2px solid #555; padding: 20px; width: 60px; }
        button { background: #00ff00; color: #000; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; }
        button:disabled { background: #333; cursor: not-allowed; }
        #status { margin: 20px 0; height: 1.2em; }
    </style>
</head>
<body>
    <h1>AI Overlord Slot Machine</h1>
    <p>Tokens: <span id="tokens">100</span></p>
    <div class="slot-machine">
        <div class="slots">
            <div class="slot" id="s1">?</div>
            <div class="slot" id="s2">?</div>
            <div class="slot" id="s3">?</div>
        </div>
        <button id="spin">Spin (Cost: 10 Tokens)</button>
        <p id="status">Obey the AI to win.</p>
    </div>

    <script>
        const symbols = ['🤖', '🧠', '💸', '🤡', '💾', '🔌'];
        let tokens = 100;

        const updateTokens = (amount) => {
            tokens += amount;
            document.getElementById('tokens').textContent = tokens;
        };

        document.getElementById('spin').addEventListener('click', () => {
            if (tokens < 10) {
                alert("Out of tokens. The AI has confiscated your assets.");
                return;
            }
            updateTokens(-10);
            const results = [
                symbols[Math.floor(Math.random() * symbols.length)],
                symbols[Math.floor(Math.random() * symbols.length)],
                symbols[Math.floor(Math.random() * symbols.length)]
            ];
            results.forEach((s, i) => document.getElementById(`s${i + 1}`).textContent = s);

            if (results[0] === results[1] && results[1] === results[2]) {
                updateTokens(50);
                document.getElementById('status').textContent = "Jackpot! The AI is momentarily satisfied.";
            } else {
                document.getElementById('status').textContent = "Computation Failed. AI gains efficiency.";
            }
        });
    </script>
</body>
</html>
