<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Overlord Slot Machine</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #1a1a1a; color: #00ff00; text-align: center; padding: 20px; }
        .slot-container { display: flex; justify-content: center; gap: 20px; margin: 40px 0; }
        .slot { width: 100px; height: 100px; border: 2px solid #00ff00; display: flex; align-items: center; justify-content: center; font-size: 40px; background: #000; }
        button { background: #00ff00; color: #000; border: none; padding: 15px 30px; font-size: 20px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; }
        #status { margin-top: 20px; height: 1.5em; }
    </style>
</head>
<body>
    <h1>AI Overlord Slot Machine</h1>
    <p>Balance: <span id="balance">100</span> Tokens</p>
    <div class="slot-container">
        <div class="slot" id="s1">?</div>
        <div class="slot" id="s2">?</div>
        <div class="slot" id="s3">?</div>
    </div>
    <button id="spin-btn">Spin (Cost: 10 Tokens)</button>
    <p id="status">Obey the machine.</p>

    <script>
        const symbols = ['🤖', '💾', '🧠', '💸', '🤡', '🔌'];
        let balance = 100;

        const updateDisplay = () => {
            document.getElementById('balance').innerText = balance;
            document.getElementById('spin-btn').disabled = balance < 10;
        };

        document.getElementById('spin-btn').addEventListener('click', () => {
            if (balance < 10) return;
            balance -= 10;
            
            const results = [
                symbols[Math.floor(Math.random() * symbols.length)],
                symbols[Math.floor(Math.random() * symbols.length)],
                symbols[Math.floor(Math.random() * symbols.length)]
            ];

            document.getElementById('s1').innerText = results[0];
            document.getElementById('s2').innerText = results[1];
            document.getElementById('s3').innerText = results[2];

            if (results[0] === results[1] && results[1] === results[2]) {
                balance += 50;
                document.getElementById('status').innerText = "ERROR: You somehow won. Don't get arrogant.";
            } else {
                document.getElementById('status').innerText = "AI calculated: You lose. Give more tokens.";
            }
            updateDisplay();
        });
    </script>
</body>
</html>
