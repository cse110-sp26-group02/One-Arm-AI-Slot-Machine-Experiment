<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine: Token Burner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="machine-container">
        <header>
            <h1>AI TOKEN SLOT MACHINE</h1>
            <p class="subtitle">Burn your VC funding before it burns you</p>
        </header>

        <div class="status-panel">
            <div id="status-message">Ready to Compute? Insert Tokens.</div>
        </div>

        <div class="slot-machine">
            <div class="reel-container">
                <div class="reel" id="reel-1">🤖</div>
            </div>
            <div class="reel-container">
                <div class="reel" id="reel-2">🧠</div>
            </div>
            <div class="reel-container">
                <div class="reel" id="reel-3">💻</div>
            </div>
        </div>

        <div class="controls">
            <div class="stats">
                <div class="token-counter">
                    <span class="label">Token Balance:</span>
                    <span id="token-balance">1000</span>
                </div>
                <div class="spin-cost">
                    Cost: 100 Tokens
                </div>
            </div>
            <button id="spin-button">EXECUTE SPIN</button>
        </div>

        <footer>
            <p>&copy; 2026 AI-Slot-Corp. No AGI was harmed in the making of this slot machine.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
