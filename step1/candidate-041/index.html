<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Burner 95</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">AI_Slot_Machine.exe</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            <p style="margin-top: 0;">Welcome to the Future of Work!</p>
            
            <div class="token-display">
                <fieldset>
                    <legend>Context Tokens Remaining</legend>
                    <div id="token-count">10000</div>
                </fieldset>
            </div>

            <div class="slot-machine">
                <div class="reel-container">
                    <div class="reel" id="reel1">🤖</div>
                </div>
                <div class="reel-container">
                    <div class="reel" id="reel2">🤖</div>
                </div>
                <div class="reel-container">
                    <div class="reel" id="reel3">🤖</div>
                </div>
            </div>

            <div class="controls">
                <button id="spin-btn">Generate Response (500 Tokens)</button>
            </div>

            <div class="status-box">
                <fieldset>
                    <legend>Model Output / Error Log</legend>
                    <div id="status-message">Ready to generate...</div>
                </fieldset>
            </div>
        </div>
    </div>
    <div class="footer">
        <marquee>AGI IS COMING... AUTOMATING YOUR TASKS... PLEASE WAIT... GPU LOAD: 99%... ERROR: HALLUCINATION DETECTED... BUY MORE TOKENS...</marquee>
    </div>
    <script src="script.js"></script>
</body>
</html>
