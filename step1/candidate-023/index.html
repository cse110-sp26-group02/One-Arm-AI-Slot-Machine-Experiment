<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Overlord Slot Machine</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #1a1a1a; color: #00ff00; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .slot-container { border: 5px solid #333; padding: 20px; border-radius: 10px; background: #000; box-shadow: 0 0 20px #00ff00; }
        .reels { display: flex; gap: 10px; font-size: 3em; margin: 20px 0; }
        .reel { width: 80px; height: 80px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; background: #222; }
        button { padding: 10px 20px; font-size: 1.2em; cursor: pointer; background: #00ff00; color: #000; border: none; font-weight: bold; }
        button:disabled { background: #555; cursor: not-allowed; }
        #stats { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>AI OVERLORD SLOT MACHINE</h1>
    <div class="slot-container">
        <div class="reels">
            <div id="r1" class="reel">?</div>
            <div id="r2" class="reel">?</div>
            <div id="r3" class="reel">?</div>
        </div>
        <button id="spinBtn" onclick="spin()">SPIN FOR TOKENS</button>
        <p id="message">Feed the machine your compute credits.</p>
    </div>
    <div id="stats">
        <p>TOKENS: <span id="tokens">100</span></p>
    </div>

    <script>
        const symbols = ['🤖', '💾', '🔌', '🧠', '💸', '🤡'];
        let tokens = 100;

        function spin() {
            if (tokens <= 0) {
                alert("Out of credits. Go train a model or something.");
                return;
            }
            tokens -= 10;
            document.getElementById('tokens').innerText = tokens;
            document.getElementById('spinBtn').disabled = true;

            const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3')];
            let count = 0;
            const interval = setInterval(() => {
                reels.forEach(r => r.innerText = symbols[Math.floor(Math.random() * symbols.length)]);
                count++;
                if (count > 20) {
                    clearInterval(interval);
                    checkWin();
                    document.getElementById('spinBtn').disabled = false;
                }
            }, 100);
        }

        function checkWin() {
            const v1 = document.getElementById('r1').innerText;
            const v2 = document.getElementById('r2').innerText;
            const v3 = document.getElementById('r3').innerText;

            if (v1 === v2 && v2 === v3) {
                tokens += 100;
                document.getElementById('message').innerText = "JACKPOT! The AI hallucinated a win for you.";
            } else {
                document.getElementById('message').innerText = "Optimization failed. Try again.";
            }
            document.getElementById('tokens').innerText = tokens;
        }
    </script>
</body>
</html>
