<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Grifter Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AI Grifter</h1>
        <div id="balance">Tokens: <span id="tokens">100</span></div>
        <div class="slot-machine">
            <div class="reel" id="reel1">?</div>
            <div class="reel" id="reel2">?</div>
            <div class="reel" id="reel3">?</div>
        </div>
        <button id="spinBtn">Query (Cost: 10)</button>
        <div id="message"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
