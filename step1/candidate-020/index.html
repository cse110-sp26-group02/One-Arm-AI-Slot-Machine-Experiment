<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Slot Machine: The Hallucinator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>THE HALLUCINATOR 9000</h1>
        <div id="status">State: Awaiting Input</div>
        <div id="reels">
            <div class="reel" id="reel1">?</div>
            <div class="reel" id="reel2">?</div>
            <div class="reel" id="reel3">?</div>
        </div>
        <div id="controls">
            <p>Tokens: <span id="tokens">100</span></p>
            <button id="spin-btn">RUN INFERENCE (-10 Tokens)</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
