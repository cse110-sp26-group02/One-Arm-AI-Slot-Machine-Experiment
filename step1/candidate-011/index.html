<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Gacha</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>AI Token Casino</h1>
        <p class="subtitle">Where your context window goes to die.</p>
        
        <div class="stats">
            <div class="stat-box">
                <span>Remaining Tokens:</span>
                <span id="token-count">10000</span>
            </div>
            <div class="stat-box">
                <span>Prompt Cost:</span>
                <span id="spin-cost">100</span>
            </div>
        </div>

        <div class="slot-machine">
            <div class="reel" id="reel1">
                <div class="symbols"></div>
            </div>
            <div class="reel" id="reel2">
                <div class="symbols"></div>
            </div>
            <div class="reel" id="reel3">
                <div class="symbols"></div>
            </div>
        </div>

        <button id="spin-button">Generate Response (Spin)</button>
        
        <div id="message-area" class="message-area">
            Awaiting input prompt...
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
