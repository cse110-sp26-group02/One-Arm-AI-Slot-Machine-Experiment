<!DOCTYPE html>
<html lang="en">

    <title>AI Grift: The Slot Machine</title>

</head>
<body>
    <div class="container">
        <h1>AI Grift</h1>
        <div id="tokens">Tokens: 100</div>

    </div>
    <script src="script.js"></script>
</body>
</html>
