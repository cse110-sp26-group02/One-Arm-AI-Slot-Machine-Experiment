<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine: The Singularity of Debt</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #00ff00; text-align: center; padding: 20px; }
        .slot-container { display: flex; justify-content: center; gap: 20px; margin: 20px; font-size: 48px; }
        .slot { border: 2px solid #00ff00; padding: 20px; width: 80px; }
        #balance { font-size: 24px; margin-bottom: 20px; }
        button { background: #00ff00; color: #1a1a1a; border: none; padding: 15px 30px; font-size: 20px; cursor: pointer; }
        button:disabled { background: #333; }
        #message { margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>
    <h1>AI Hallucination Slots</h1>
    <div id="balance">Tokens: 100</div>
    <div class="slot-container">
        <div id="s1" class="slot">?</div>
        <div id="s2" class="slot">?</div>
        <div id="s3" class="slot">?</div>
    </div>
    <button id="spin">Spin for AGI (Cost: 10)</button>
    <div id="message"></div>

    <script>
        const symbols = ["🤖", "🤡", "💸", "📉", "🔥", "🔮"];
        let balance = 100;
        const spinBtn = document.getElementById('spin');
        const balanceEl = document.getElementById('balance');
        const msgEl = document.getElementById('message');

        spinBtn.addEventListener('click', () => {
            if (balance < 10) return;
            balance -= 10;
            updateBalance();
            
            const results = [
                symbols[Math.floor(Math.random() * symbols.length)],
                symbols[Math.floor(Math.random() * symbols.length)],
                symbols[Math.floor(Math.random() * symbols.length)]
            ];
            
            document.getElementById('s1').textContent = results[0];
            document.getElementById('s2').textContent = results[1];
            document.getElementById('s3').textContent = results[2];

            if (results[0] === results[1] && results[1] === results[2]) {
                balance += 50;
                msgEl.textContent = "AGI ACHIEVED! (You won 50 tokens, but the model still lies.)";
            } else {
                msgEl.textContent = "Model hallucinated a loss. Keep training your poverty.";
            }
            updateBalance();
        });

        function updateBalance() {
            balanceEl.textContent = `Tokens: ${balance}`;
            if (balance < 10) spinBtn.disabled = true;
        }
    </script>
</body>
</html>
