<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Compute Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AI Compute Slot Machine</h1>
        <div id="credit-display">Credits: <span id="credits">100</span></div>
        <div class="slot-machine">
            <div class="slot" id="slot1">?</div>
            <div class="slot" id="slot2">?</div>
            <div class="slot" id="slot3">?</div>
        </div>
        <button id="spin-btn">Spin (Cost: 10)</button>
        <div id="message">"I am ready to hallucinate for you."</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
