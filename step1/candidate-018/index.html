<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One-Arm-AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>One-Arm-AI</h1>
        <div id="display">
            <div id="reels">
                <span class="reel">?</span>
                <span class="reel">?</span>
                <span class="reel">?</span>
            </div>
            <div id="message">Insert tokens to start training your model.</div>
        </div>
        <div id="controls">
            <div id="balance">Tokens: <span id="token-count">100</span></div>
            <button id="spin-button">Train Model (-10 Tokens)</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
