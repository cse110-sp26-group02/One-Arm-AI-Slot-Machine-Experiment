<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Overlord Slot Machine</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #00ff00; text-align: center; padding: 20px; }
        .slot-container { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        .slot { width: 100px; height: 100px; border: 2px solid #00ff00; display: flex; align-items: center; justify-content: center; font-size: 40px; background: #000; }
        button { background: #00ff00; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; }
        #message { margin-top: 20px; min-height: 1.2em; }
    </style>
</head>
<body>
    <h1>AI Overlord Slot Machine</h1>
    <p>Tokens: <span id="tokens">100</span></p>
    <div class="slot-container">
        <div class="slot" id="slot1">?</div>
        <div class="slot" id="slot2">?</div>
        <div class="slot" id="slot3">?</div>
    </div>
    <button id="spinBtn">SPIN (-10 Tokens)</button>
    <div id="message"></div>

    <script>
        const symbols = ['🤖', '💾', '🔌', '🧠', '💸', '❌'];
        let tokens = 100;
        const spinBtn = document.getElementById('spinBtn');
        const tokenDisplay = document.getElementById('tokens');
        const messageDisplay = document.getElementById('message');

        spinBtn.addEventListener('click', () => {
            if (tokens < 10) {
                messageDisplay.innerText = "You're bankrupt! The AI has seized your assets.";
                return;
            }
            tokens -= 10;
            tokenDisplay.innerText = tokens;
            
            const results = [
                symbols[Math.floor(Math.random() * symbols.length)],
                symbols[Math.floor(Math.random() * symbols.length)],
                symbols[Math.floor(Math.random() * symbols.length)]
            ];

            document.getElementById('slot1').innerText = results[0];
            document.getElementById('slot2').innerText = results[1];
            document.getElementById('slot3').innerText = results[2];

            if (results[0] === results[1] && results[1] === results[2]) {
                tokens += 50;
                tokenDisplay.innerText = tokens;
                messageDisplay.innerText = "Jackpot! The AI experienced a glitch and paid you.";
            } else {
                messageDisplay.innerText = "The AI thanks you for your contribution to its server costs.";
            }
        });
    </script>
</body>
</html>
