<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Hype Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>AI Hype Slot</h1>
        <div id="balance">Tokens: <span id="balance-val">100</span></div>
        <div id="reels">
            <div class="reel" id="r1">?</div>
            <div class="reel" id="r2">?</div>
            <div class="reel" id="r3">?</div>
        </div>
        <button id="spin-btn">Generate Insight (Cost: 10 Tokens)</button>
        <div id="status">Ready for training...</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
