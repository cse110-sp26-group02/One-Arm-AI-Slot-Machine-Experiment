<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Overlord Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>AI Overlord Slot Machine</h1>
        <div id="stats">
            <p>Tokens: <span id="token-count">100</span></p>
            <p>Spin Cost: 5 Tokens</p>
        </div>
        
        <div id="slot-machine">
            <div class="slot" id="slot1">?</div>
            <div class="slot" id="slot2">?</div>
            <div class="slot" id="slot3">?</div>
            <div id="lever"></div>
        </div>

        <div id="message">Insert tokens to appease the AI Overlord.</div>

        <div id="paytable">
            <h3>Paytable</h3>
            <ul>
                <li>Double AI: 10 Tokens</li>
                <li>Triple AI: 50 Tokens</li>
            </ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
